name: PrintableCheckList

options:
  bundleIdPrefix: com.wehack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configFiles:
  Debug: Config/Base.xcconfig
  Release: Config/Base.xcconfig

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.wehack.PrintableCheckList
    MARKETING_VERSION: 2.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.0
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Flash
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_ASSET_PATHS: ""

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    exactVersion: 2.52.0

targets:
  PrintableCheckList:
    type: application
    platform: iOS
    info:
      path: PrintableCheckList/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_PUBLISHABLE_KEY: "$(SUPABASE_PUBLISHABLE_KEY)"
    sources:
      - path: PrintableCheckList
        excludes:
          - Resources
      - path: PrintableCheckList/Resources
        buildPhase: resources
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: PrintableCheckList/PrintableCheckList.entitlements
    dependencies:
      - package: Supabase

  PrintableCheckListTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PrintableCheckListTests
    dependencies:
      - target: PrintableCheckList
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wehack.PrintableCheckListTests
        GENERATE_INFOPLIST_FILE: YES

  PrintableCheckListUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PrintableCheckListUITests
    dependencies:
      - target: PrintableCheckList
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wehack.PrintableCheckListUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PrintableCheckList:
    build:
      targets:
        PrintableCheckList: all
        PrintableCheckListTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - PrintableCheckListTests
        - PrintableCheckListUITests
